# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

final_space: true
version: 4
async: true

palette:
  base: "#1e1e2e"
  blue: "#89b4fa"
  crust: "#11111b"
  flamingo: "#f2cdcd"
  green: "#a6e3a1"
  lavender: "#b4befe"
  mantle: "#181825"
  maroon: "#eba0ac"
  mauve: "#cba6f7"
  overlay0: "#6c7086"
  overlay1: "#7f849c"
  overlay2: "#9399b2"
  peach: "#fab387"
  pink: "#f5c2e7"
  red: "#f38ba8"
  rosewater: "#f5e0dc"
  sapphire: "#74c7ec"
  sky: "#89dceb"
  subtext0: "#a6adc8"
  subtext1: "#bac2de"
  surface0: "#313244"
  surface1: "#45475a"
  surface2: "#585b70"
  teal: "#94e2d5"
  text: "#494D64"
  white: "#FFFFFF"
  yellow: "#f9e2af"

var:
  TermWidthCutOff: 120

transient_prompt:
  template: ">"
  foreground: p:lavender
  background: transparent

# Actual prompt
blocks:
  # Left side
  - type: prompt
    alignment: left
    segments:
      # Environment icon
      - type: os
        style: diamond
        powerline_symbol: 
        template: " {{.Icon}} "
        foreground: p:base
        background: p:subtext1
        cache:
          cache: 24h
          strategy: device
      # Auto adjusting vi-mode segment
      - type: text
        min_width: 120
        template: "{{ if .Env.POSH_VI_MODE }} <b>{{ .Env.POSH_VI_MODE }}</b> {{ end }}"
        foreground: red
        powerline_symbol: 
        background: p:surface1
        style: powerline
        foreground_templates:
          - '{{if contains "NORMAL" .Env.POSH_VI_MODE}}p:blue{{end}}'
          - '{{if contains "INSERT" .Env.POSH_VI_MODE}}p:green{{end}}'
          - '{{if contains "VISUAL" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "V-LINE" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "REPLACE" .Env.POSH_VI_MODE}}p:red{{end}}'
      # Current folder
      - type: text
        max_width: 119
        template: >
          {{- if .Env.POSH_VI_MODE -}}
            {{- if contains "V-LINE" .Env.POSH_VI_MODE -}} <b> VL </b>
            {{- else if contains "VISUAL" .Env.POSH_VI_MODE -}} <b> V </b>
            {{- else if contains "NORMAL" .Env.POSH_VI_MODE -}} <b> N </b>
            {{- else if contains "INSERT" .Env.POSH_VI_MODE -}} <b> I </b>
            {{- else if contains "REPLACE" .Env.POSH_VI_MODE -}} <b> R </b>
            {{- end -}}
          {{- end -}}
        foreground: red
        powerline_symbol: 
        background: p:surface1
        style: powerline
        foreground_templates:
          - '{{if contains "NORMAL" .Env.POSH_VI_MODE}}p:blue{{end}}'
          - '{{if contains "INSERT" .Env.POSH_VI_MODE}}p:green{{end}}'
          - '{{if contains "VISUAL" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "V-LINE" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "REPLACE" .Env.POSH_VI_MODE}}p:red{{end}}'
      # Current folder
      - type: path
        min_width: 120
        options:
          folder_icon: ....
          home_icon: "~"
          max_depth: 3
          max_width: 15
          style: agnoster_short
        template: " {{ .Path }} "
        foreground: p:text
        powerline_symbol: 
        style: powerline
        background_templates:
          - "{{if .Env.POSH_VI_MODE }}{{else}}p:blue{{end}}"
          - '{{if contains "NORMAL" .Env.POSH_VI_MODE}}p:blue{{end}}'
          - '{{if contains "INSERT" .Env.POSH_VI_MODE}}p:green{{end}}'
          - '{{if contains "VISUAL" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "V-LINE" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "REPLACE" .Env.POSH_VI_MODE}}p:red{{end}}'
      - type: path
        max_width: 119
        options:
          folder_icon: ....
          home_icon: "~"
          max_depth: 1
          max_width: 10
          style: agnoster_short
        template: " {{ .Path }} "
        foreground: p:text
        powerline_symbol: 
        style: powerline
        background_templates:
          - "{{if .Env.POSH_VI_MODE }}{{else}}p:blue{{end}}"
          - '{{if contains "NORMAL" .Env.POSH_VI_MODE}}p:blue{{end}}'
          - '{{if contains "INSERT" .Env.POSH_VI_MODE}}p:green{{end}}'
          - '{{if contains "VISUAL" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "V-LINE" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "REPLACE" .Env.POSH_VI_MODE}}p:red{{end}}'
      - type: git
        min_width: 120
        options:
          branch_icon: "  "
          cherry_pick_icon: " "
          commit_icon: " "
          fetch_status: true
          fetch_upstream_icon: true
          merge_icon: " "
          no_commits_icon: " "
          rebase_icon: " "
          revert_icon: " "
          tag_icon: " "
        template: " {{ .UpstreamIcon }} {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }}"
        foreground: p:text
        powerline_symbol: 
        background: p:teal
        style: powerline
        background_templates:
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}"
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:maroon{{ end }}"
          - "{{ if gt .Ahead 0 }}p:mauve{{ end }}"
          - "{{ if gt .Behind 0 }}p:mauve{{ end }}"
      - type: git
        options:
          fetch_status: true
          fetch_upstream_icon: true
        max_width: 119
        template: "{{ .UpstreamIcon }} "
        foreground: p:text
        powerline_symbol: 
        background: p:teal
        style: powerline
        background_templates:
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}"
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:maroon{{ end }}"
          - "{{ if gt .Ahead 0 }}p:mauve{{ end }}"
          - "{{ if gt .Behind 0 }}p:mauve{{ end }}"

  - type: rprompt
    alignment: left
    overflow: hide
    segments:
      - type: status
        options:
          always_enabled: true
        leading_diamond: 
        template: " {{ if gt .Code 0 }}{{ .Code }} ✘ {{ else }}✔ {{ end }}"
        background: p:surface1
        style: diamond
        foreground_templates:
          - "{{if gt .Code 0 }}p:red{{ end }}"
          - "{{if eq .Code 0 }}p:green{{ end }}"
      - type: executiontime
        options:
          always_enabled: false
          style: round
          threshold: 5000
        leading_diamond: 
        template: " {{ .FormattedMs }}  "
        foreground: p:text
        background: p:mauve
        style: diamond
      - type: python
        options:
          display_mode: always
          home_enabled: true
        leading_diamond: 
        template: " {{ if .Venv }}{{ .Venv }}{{ end }}  "
        foreground: p:text
        style: diamond
        background_templates:
          - "{{if .Env.POSH_VI_MODE }}{{else}}p:blue{{end}}"
          - '{{if contains "NORMAL" .Env.POSH_VI_MODE}}p:blue{{end}}'
          - '{{if contains "INSERT" .Env.POSH_VI_MODE}}p:green{{end}}'
          - '{{if contains "VISUAL" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "V-LINE" .Env.POSH_VI_MODE}}p:mauve{{end}}'
          - '{{if contains "REPLACE" .Env.POSH_VI_MODE}}p:red{{end}}'
